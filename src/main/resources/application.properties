spring.application.name=sa-fintech-payments-api

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sa_fintech_payments}
spring.datasource.username=${DB_USERNAME:sa_fintech}
spring.datasource.password=${DB_PASSWORD:sa_fintech}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:dev-only-sa-fintech-payments-api-secret-change-before-production-1234567890}
app.security.jwt.issuer=sa-fintech-payments-api
app.security.jwt.expiry-minutes=60

app.webhooks.simulated.secret=${SIMULATED_WEBHOOK_SECRET:dev-only-simulated-webhook-secret}
