services:
  postgres:
    image: postgres:16-alpine
    container_name: sa-fintech-payments-postgres
    environment:
      POSTGRES_DB: sa_fintech_payments
      POSTGRES_USER: sa_fintech
      POSTGRES_PASSWORD: sa_fintech
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa_fintech -d sa_fintech_payments"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
